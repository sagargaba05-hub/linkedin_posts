name: linkedin-automation (staging)

# Runs against a separate sheet + Slack channel so you can test changes
# without affecting production. Branch-gated to `staging`.
on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip actual LinkedIn POST"
        required: false
        default: "true"  # Default to dry-run in staging — safer
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: linkedin-automation-staging
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automation (staging)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.STAGING_GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.STAGING_SHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.STAGING_SLACK_CHANNEL_ID }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          TZ: "Australia/Sydney"
          DAILY_DRAFT_HOUR: "10"
          ENVIRONMENT: "staging"
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: python linkedin_automation.py
