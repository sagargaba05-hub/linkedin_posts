name: linkedin-automation (production)

on:
  # Runs every 15 minutes (UTC). The script internally decides whether
  # it's time to draft (10 AM in TZ) and always polls Slack threads.
  schedule:
    - cron: "*/15 * * * *"

  # Manual trigger for ad-hoc runs / testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip actual LinkedIn POST (everything else still runs)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      force_daily_draft:
        description: "Generate a Slack draft now, ignoring day/hour/once-per-day gates"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

# Only run on main — staging branch has its own workflow
permissions:
  contents: read

# Prevent overlapping runs — if a previous run is still going, queue this one.
concurrency:
  group: linkedin-automation-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automation
        env:
          # Secrets — set in repo Settings → Secrets and variables → Actions → Secrets
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          # Runtime config — set via control-panel.html → repo Variables.
          # Defaults below kick in if a Variable is unset (so prod still works
          # before you ever open the control panel).
          ENABLED: ${{ vars.ENABLED || 'true' }}
          DAILY_DRAFT_HOUR: ${{ vars.DAILY_DRAFT_HOUR || '10' }}
          ENABLED_DAYS: ${{ vars.ENABLED_DAYS || 'monday,tuesday,wednesday,thursday,friday' }}
          # Static config — change in this YAML if you ever move timezones
          TZ: "Australia/Sydney"
          ENVIRONMENT: "production"
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          FORCE_DAILY_DRAFT: ${{ github.event.inputs.force_daily_draft == 'true' && '1' || '0' }}
        run: python linkedin_automation.py
